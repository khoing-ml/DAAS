name = "sdxl-base-imagereward-smoke-test"

[metadata]
owner = "khoi"
goal = "SDXL with ImageReward smoke test for DAAS evolution steering"
description = "Lightweight test run to verify pipeline loading, inference, and ImageReward scoring"

[model]
preset = "sdxl-base"
torch_dtype = "float16"
device = "auto"
enable_model_cpu_offload = true
enable_vae_slicing = true
enable_attention_slicing = true

[reward]
name = "imagereward"

[steering]
guidance_scale = 0.75
max_update_norm = 3.0

[steering.threshold]
name = "quantile"
quantile = 0.75

[steering.gate]
name = "constant"
scale = 1.0

[steering.kernel]
name = "rbf"

[steering.score_estimator]
name = "kde"
bandwidth = 1.0
chunk_size = 8

[steering.step_window]
min_fraction = 0.2
max_fraction = 0.8

[sampling]
prompt = "cinematic photo of a futuristic city at sunrise"
negative_prompt = "low quality, blurry, distorted"
num_inference_steps = 12
guidance_scale = 7.0
num_particles = 4
num_images_per_prompt = 1
height = 256
width = 256
seed = 42
output_type = "pil"
seg_loops = 2
seg_elite_keep = 1
seg_noise_scale = 0.02
seg_use_intermediate_rewards = true
seg_inner_stein_steps = 2
seg_intermediate_reward_output_type = "pt"

[logging]
log_dir = "logs"
run_name = "imagereward_smoke_test"
